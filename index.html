<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="new-btn" id="new-btn">+ New Book</button>

    <div class="books-container"></div>
    <dialog id="book-dialog">
      <form id="book-form" class="book-form">
        <div class="form-row">
          <label for="title">Name</label>
          <input type="text" id="title" class="form-input" name="title" required/>
        </div>

        <div class="form-row">
          <label for="author">Author</label>
          <input type="text" id="author" class="form-input" name="author" />
        </div>

        <div class="form-row">
          <label for="pages">No. of Pages</label>
          <input type="number" id="pages" class="form-input" name="pages" />
        </div>

        <div class="form-row">
          <label for="read">Read</label>
          <input type="text" id="read" class="form-input" name="read" />
        </div>

        <div class="dialog-btns">
          <button type="button" class="add-btn" id="add-btn">Add</button>
          <button type="button" class="close-btn" id="cancel-btn">
            Cancel
          </button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
