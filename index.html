<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Book Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header>
      <div class="heading">My Library</div>
    </header>
    <button class="new-btn" id="new-btn">+ New Book</button>

    <div class="books-container"></div>

    <dialog id="book-dialog" aria-label="Book Library Dialog">
      <form id="book-form" class="book-form">
        <div class="form-row">
          <label for="title">Name</label>
          <input
            type="text"
            id="title"
            class="form-input"
            name="title"
            required
          />
        </div>

        <div class="form-row">
          <label for="author">Author</label>
          <input
            type="text"
            id="author"
            class="form-input"
            name="author"
            required
          />
        </div>

        <div class="form-row">
          <label for="pages">No. of Pages</label>
          <input
            type="number"
            id="pages"
            class="form-input"
            name="pages"
            required
          />
        </div>

        <div class="form-row">
          <label for="read">Read</label>
          <input
            type="checkbox"
            id="read"
            class="form-input"
            name="read"
            required
          />
        </div>

        <div class="dialog-btns">
          <button type="submit" class="add-btn" id="add-btn">Add</button>
          <button type="button" class="close-btn" id="cancel-btn">
            Cancel
          </button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
